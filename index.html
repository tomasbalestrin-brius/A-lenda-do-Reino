<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#020617" />
    <meta name="description" content="A Lenda do Reino - Criador de Personagens PWA" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>A Lenda do Reino - RPG Maker</title>
  </head>
  <body class="bg-[#020617]">
    <div id="root">
      <style>
        .initial-loader {
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          background: #020617;
          z-index: 9999;
        }
        .spinner {
          width: 48px;
          height: 48px;
          border: 4px solid rgba(245, 158, 11, 0.1);
          border-top-color: #f59e0b;
          border-radius: 50%;
          animation: spin 1s linear infinite;
          margin-bottom: 24px;
        }
        .loading-text {
          color: #f59e0b;
          font-family: sans-serif;
          font-weight: 900;
          text-transform: uppercase;
          letter-spacing: 0.3em;
          animation: pulse 2s ease-in-out infinite;
          font-size: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
      </style>
      <div class="initial-loader">
        <div class="spinner"></div>
        <div class="loading-text">Convocando o Reino...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
